name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install conversion tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils zip

      - name: Build preview images & downloads
        run: node scripts/buildAssets.mjs

      - name: Build (set BASE_URL for project pages)
        env:
          BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages

